<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>DAIYA | 物販×AI</title>
<style>
  :root {
    --bg: #050b1a;
    --card: #0d1730;
    --card-border: #1c2b4f;
    --accent: #9ef01a;
    --text: #f5f7fa;
    --text-dim: #9aa5bd;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    background-image:
      linear-gradient(rgba(158,240,26,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(158,240,26,0.05) 1px, transparent 1px);
    background-size: 28px 28px;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    min-height: 100vh;
  }
  .wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 56px 24px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .avatar {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: linear-gradient(135deg, #9ef01a, #4d7c0f);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    font-weight: 800;
    color: #06110a;
    margin-bottom: 18px;
    box-shadow: 0 0 0 3px rgba(158,240,26,0.25);
  }
  .handle {
    font-size: 19px;
    font-weight: 700;
    letter-spacing: 0.02em;
    margin-bottom: 10px;
  }
  .handle .accent { color: var(--accent); }
  .bio {
    text-align: center;
    font-size: 13.5px;
    line-height: 1.9;
    color: var(--text-dim);
    margin-bottom: 34px;
  }
  .bio strong { color: var(--text); font-weight: 700; }
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  a.linkbtn {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 16px 20px;
    border-radius: 14px;
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text);
    text-decoration: none;
    font-size: 15.5px;
    font-weight: 600;
    transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  }
  a.linkbtn:active { transform: scale(0.98); }
  a.linkbtn:hover { border-color: var(--accent); }
  a.linkbtn.primary {
    background: linear-gradient(135deg, rgba(158,240,26,0.16), rgba(158,240,26,0.05));
    border: 1px solid rgba(158,240,26,0.5);
  }
  .icon {
    width: 26px;
    height: 26px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon svg { width: 100%; height: 100%; }
  .label { flex: 1; }
  .label .sub {
    display: block;
    font-size: 11.5px;
    font-weight: 400;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .arrow { color: var(--text-dim); font-size: 16px; }
  footer {
    margin-top: 40px;
    font-size: 11px;
    color: #4a5578;
    text-align: center;
  }
</style>
